<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Pets</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>Adoção de Pets</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Locais de Adoção</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>Encontre o Pet dos seus sonhos!</h2>
            <p>Procure por locais de adoção perto de você.</p>
            <button id="find-location">Encontrar locais próximos</button>
        </div>
    </section>

    <section class="adopt-locations" id="locations">
        <div class="container">
            <h2>Locais de Adoção</h2>
            <div class="location-list" id="location-list">
                <!-- Lista de locais de adoção vai aparecer aqui -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Adoção de Pets. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        $(document).ready(function() {
            $("#find-location").click(function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchAdoptionLocations(lat, lon);
                    });
                } else {
                    alert("Geolocalização não suportada pelo seu navegador.");
                }
            });
        });

        function fetchAdoptionLocations(lat, lon) {
            // Simulando dados de locais de adoção com base nas coordenadas
            const locations = [
                { name: "Abrigo de Cães do Centro", distance: "2 km" },
                { name: "Petshop Amigo Fiel", distance: "4.5 km" },
                { name: "ONG Coração de Bicho", distance: "3.2 km" }
            ];

            let locationHtml = "";
            locations.forEach(function(location) {
                locationHtml += `
                    <div class="location-item">
                        <h3>${location.name}</h3>
                        <p>Distância: ${location.distance}</p>
                    </div>
                `;
            });
            $("#location-list").html(locationHtml);
        }
    </script>
</body>
</html>
